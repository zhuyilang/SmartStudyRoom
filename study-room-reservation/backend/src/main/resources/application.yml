spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study_room?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1741147728

  # Session й–°е¶Үз–Ҷ
  session:
    timeout: 1800   # 30йҚ’е—ӣжҢ“йҸғзҠіжҗ·жөЈж»ҶеҡңйҚ”г„©вӮ¬вӮ¬йҚ‘?
server:
  port: 8080

# MyBatis-Plus й–°е¶Үз–Ҷ
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.studyroom.entity
  configuration:
    map-underscore-to-camel-case: true   # й‘·оҒ„е§©жӨ№з…ҺеҳІй”ӣжӯ¶ser_name йҲ«?userName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # йҺәСғеҹ—йҚҷзүҲеўҰйҚ—зҷқQLй”ӣе Јзҡҹз’Үжӣ ж•Өй”ӣ?  global-config:
    db-config:
      id-type: auto                      # ж¶“е©ҡж•ӯй‘·оҒ„о–ғ
      logic-delete-field: deleted        # й–«жҳҸз·«йҚ’зҠ»ж«ҺзҖӣжҘҒоҶҢ
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j йҺәгғҘеҪӣйҸӮеӣЁгҖӮй–°е¶Үз–Ҷ
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
